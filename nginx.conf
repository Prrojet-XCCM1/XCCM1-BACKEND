events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name xccm1.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/xccm1.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xccm1.duckdns.org/privkey.pem;

	    # Support pour les WebSockets (Collaborative Editing)
   location /ws {
        proxy_pass http://109.199.105.251:8080; # Pas besoin du /ws à la fin si on gère bien le path
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade; # Dynamique
        proxy_set_header Host $host;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

	    # Serveur de collaboration Y.js (Hocuspocus) - edition de texte temps reel
    # Le conteneur n'est publie que sur 127.0.0.1:1234 (voir docker-compose.prod.yml),
    # donc on cible localhost ici, pas l'IP publique.
    location /collab/ {
        proxy_pass http://127.0.0.1:1234/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }


	    # Ajouter la route d'indexation pour le LLM
    location /api/v1/notebooks/index {
        proxy_pass http://109.199.105.251:8000/api/v1/notebooks/index;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M; # Pour permettre l'envoi de gros PDF
    }


	    # Rediriger le chat du notebook DIRECTEMENT vers le LLM-SERVICE (port 8000)
    # car c'est lui qui gère le RAG et les PDF.
    location /api/v1/notebooks/chat {
        proxy_pass http://109.199.105.251:8000/api/v1/notebooks/chat; # Notez le port 8000
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Rediriger la génération Studio DIRECTEMENT vers le LLM-SERVICE (port 8000)
    location /api/v1/notebooks/studio/generate {
        proxy_pass http://109.199.105.251:8000/api/v1/notebooks/studio/generate;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }


    # Nouveau : Route pour l'Agent IA
	# Nouveau : Route pour l'Agent I
    location /ai/ {
        proxy_pass http://109.199.105.251:5000/; # <-- Remplacez xccm-iaxccm par 127.0.0.1
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Indique à FastAPI qu'il s'exécute derrière le préfixe /ai
        proxy_set_header X-Forwarded-Prefix /ai; 
    }	

    # Nouveau : Route pour le service LLM
    location /llm/ {
        proxy_pass http://109.199.105.251:8000/; # Notez le / à la fin
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Génération IA : flux SSE long, ne pas bufferiser ni couper à 60s
    location = /courses/generate-ai {
        proxy_pass http://109.199.105.251:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
        chunked_transfer_encoding on;
    }

    # Route par défaut vers Spring Boot
    location / {
        proxy_pass http://109.199.105.251:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
}

