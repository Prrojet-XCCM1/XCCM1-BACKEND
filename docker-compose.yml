version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg${POSTGRES_VERSION:-17}
    container_name: ${POSTGRES_CONTAINER_NAME}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xccm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    container_name: ${ELASTICSEARCH_CONTAINER_NAME:-elasticsearch}
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=98%
      - cluster.routing.allocation.disk.watermark.high=99%
      - cluster.routing.allocation.disk.watermark.flood_stage=99.5%
    ports:
      - "${ELASTIC_PORT:-9200}:9200"
    networks:
      - xccm-network
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-redis}
    networks:
      - xccm-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: ${DOCKER_IMAGE:-xccm-backend:latest}
    container_name: ${APP_CONTAINER_NAME}
    env_file: .env
    ports:
      - "${APP_PORT}:8080"
    environment:
      DB_URL: jdbc:postgresql://${POSTGRES_CONTAINER_NAME}:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ELASTICSEARCH_URIS: http://${ELASTICSEARCH_CONTAINER_NAME:-elasticsearch}:9200
      LLM_SERVICE_URL: ${LLM_SERVICE_URL:-http://xccm-llm-service:8000}
      REDIS_HOST: ${REDIS_CONTAINER_NAME:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - xccm-network

  hocuspocus:
    build:
      context: ./hocuspocus
      dockerfile: Dockerfile
    image: ${HOCUSPOCUS_IMAGE:-ghcr.io/prrojet-xccm1/xccm1-backend-hocuspocus:latest}
    container_name: xccm-hocuspocus
    ports:
      - "127.0.0.1:1234:1234"
    environment:
      PORT: 1234
      SPRING_API_URL: http://${APP_CONTAINER_NAME:-app}:8080
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-hocuspocus-internal-key}
      NODE_ENV: production
    depends_on:
      - app
    networks:
      - xccm-network
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:
  redis_data:

networks:
  xccm-network:
    driver: bridge
