version: "3.8"

services:
  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:16-alpine
    container_name: xccm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xccm}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xccm-network
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: xccm-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - xccm-network
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - xccm-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - xccm-network

  redis:
    image: redis:7-alpine
    container_name: xccm-redis
    volumes:
      - redis_data:/data
    networks:
      - xccm-network
    restart: always

  # --- BACKEND ---
  backend:
    image: ${DOCKER_IMAGE}
    container_name: xccm-backend
    ports:
      # Exposé uniquement sur loopback → Nginx y accède via 127.0.0.1:8080
      # Non accessible depuis l'extérieur directement (sécurisé)
      - "127.0.0.1:8080:8080"
    environment:
      DB_URL: jdbc:postgresql://xccm-postgres:5432/${POSTGRES_DB:-xccm}
      DB_USERNAME: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ELASTICSEARCH_URIS: http://xccm-elasticsearch:9200
      LLM_SERVICE_URL: http://xccm-llm-service:8000
      REDIS_HOST: xccm-redis
      REDIS_PORT: 6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - postgres
      - elasticsearch
      - kafka
      - redis
    networks:
      - xccm-network
    restart: always

  # --- HOCUSPOCUS (collaboration Y.js) ---
  hocuspocus:
    image: ${HOCUSPOCUS_IMAGE}
    container_name: xccm-hocuspocus
    ports:
      # Exposé uniquement sur loopback → Nginx y accède via 127.0.0.1:1234 (proxy WebSocket)
      - "127.0.0.1:1234:1234"
    environment:
      PORT: 1234
      SPRING_API_URL: http://xccm-backend:8080
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - xccm-network
    restart: always

networks:
  xccm-network:
    external: true

volumes:
  postgres_data:
  elastic_data:
  redis_data:
