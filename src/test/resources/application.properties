# Propriétés surchargées pour les tests — credentials factices pour OAuth2
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.github.client-id=test-github-client-id
spring.security.oauth2.client.registration.github.client-secret=test-github-client-secret

# Désactiver Redis, Kafka, Elasticsearch pour les tests
spring.cache.type=none
spring.kafka.bootstrap-servers=localhost:9093
spring.elasticsearch.uris=http://localhost:9201

# Mail factice
spring.mail.username=test@test.com
spring.mail.password=test-password

# JWT
application.security.jwt.secret-key=TestSecretKeyForJWTThatIsLongEnoughForHMAC2025XYZ
