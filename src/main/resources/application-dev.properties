# Profil dev local : pas de cluster Elasticsearch requis (Swagger, LTI, APIs hors index de recherche).
# Pour activer ES en dev : d\u00e9marrer Elasticsearch sur localhost:9200 puis :
#   app.elasticsearch.enabled=true
#   spring.data.elasticsearch.repositories.enabled=true
app.elasticsearch.enabled=false
# \u00c9vite le scan auto-config Boot (conflit bean userRepository JPA vs ES) quand ES est coup\u00e9
spring.data.elasticsearch.repositories.enabled=false
