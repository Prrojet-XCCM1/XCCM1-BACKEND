spring.application.name=xccm1
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xccm1}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false


spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
spring.jackson.time-zone=Europe/Paris

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads

# LLM 

llm.service.url= ${LLM_SERVICE_URL:http://localhost:8000}

# CLEF JWT CORRIGÉE ICI
application.security.jwt.secret-key=${JWT_SECRET:MaSuperCleSecreteJWT2025QuiFaitPlusDe50Caracteres12345678901234567890}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Swagger Configuration
app.swagger.production-url=${IP_ADDRESS:https://xccm1.duckdns.org}

# Le reste est parfait
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=xccm:

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.admin.auto-create=true

spring.profiles.active=dev

# Elasticsearch (d\u00e9sactiv\u00e9 par d\u00e9faut dans application-dev.properties)
app.elasticsearch.enabled=${APP_ELASTICSEARCH_ENABLED:true}

# --- LTI 1.3 (Moodle = plateforme, XCCM1 = outil) ---
# URLs sans slash final de préférence. À surcharger en prod (env ou profil).
lti.moodle.platform-url=${LTI_MOODLE_PLATFORM_URL:http://localhost:8081}
lti.moodle.client-id=${LTI_MOODLE_CLIENT_ID:xccm1-lti-tool}
lti.moodle.jwks-url=${LTI_MOODLE_JWKS_URL:http://localhost:8081/mod/lti/certs.php}
# Issuer public du backend XCCM1 (utilisé pour redirect_uri = {issuer}/lti/launch)
lti.xccm1.issuer=${LTI_XCCM1_ISSUER:http://localhost:8080}
# Clé RSA PKCS#8 PEM (optionnel). Si vide, une paire est générée au d\u00e9marrage (kid instable pour Moodle).
lti.tool.private-key-pem-path=${LTI_TOOL_PRIVATE_KEY_PEM_PATH:}
lti.tool.key-id=${LTI_TOOL_KEY_ID:xccm1-lti-key-1}
# CSP iframe : tokens séparés par des espaces (self = mot-clé CSP). Ex. self https://moodle.univ.fr
lti.security.frame-ancestors=${LTI_SECURITY_FRAME_ANCESTORS:self}

# Elasticsearch Configuration
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
